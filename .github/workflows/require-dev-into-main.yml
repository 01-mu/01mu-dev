name: Require release branch into main

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  enforce-release-source:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR source is a release branch
        run: |
          case "${{ github.head_ref }}" in
            release/*)
              ;;
            *)
              echo "PRs into main must come from release/x.x.x. Current source: ${{ github.head_ref }}"
              exit 1
              ;;
          esac
